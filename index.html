    <!-- Anti-Flash Theme Script (sinkron dengan themeStore.ts / localStorage key "astara-theme") -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("astara-theme");
          var theme = stored === "light" ? "light" : "dark";
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
