    <!-- Primary Meta Tags -->
    <title>Astara AI</title>
    <meta name="title" content="Astara AI" />
    <meta
      name="description"
      content="Astara AI adalah chat AI dengan generative UI: jawaban gak cuma teks, tapi bisa langsung dirender jadi code block, tabel, chart, tree, dan flashcard interaktif." />
    <meta
      name="keywords"
      content="astara ai, generative ui, ai generative, chat ai indonesia, code block ai, ai coding assistant, render code interaktif, chart ai, table ai, tree block, markdown interaktif, ai chat interaktif" />
    <meta name="author" content="Astara AI" />
    <link rel="canonical" href="https://astara.rensdev.my.id/" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Astara AI",
      "alternateName": ["Astara", "Astara AI Chat"],
      "url": "https://astara.rensdev.my.id/",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "description": "Chat AI dengan generative UI yang merender jawaban sebagai code block, tabel, chart, tree, dan flashcard interaktif, bukan cuma teks biasa.",
      "inLanguage": "id"
    }
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://astara.rensdev.my.id/" />
    <meta property="og:title" content="Astara AI" />
    <meta
      property="og:description"
      content="Chat AI dengan generative UI: jawaban langsung dirender jadi code block, tabel, chart, tree, dan flashcard interaktif." />
    <meta property="og:image" content="https://astara.rensdev.my.id/og-image.png" />
    <meta property="og:image:secure_url" content="https://astara.rensdev.my.id/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Astara AI — Generative UI Chat" />
    <meta property="og:site_name" content="Astara AI" />
    <meta property="og:locale" content="id_ID" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://astara.rensdev.my.id/" />
    <meta name="twitter:title" content="Astara AI" />

      name="twitter:description"
      content="Chat AI dengan generative UI: jawaban langsung dirender jadi code block, tabel, chart, tree, dan flashcard interaktif." />

    <meta name="robots" content="index, follow" />

    <!-- Performance & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet" />

    <!-- Anti-Flash Theme Script (sinkron dengan themeStore.ts / localStorage key "astara-theme") -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("astara-theme");
          var theme = stored === "light" ? "light" : "dark";
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
